# Deploy da API para ECS (ECR + force new deployment).
#
# Pré-requisitos no repositório GitHub:
#   Secret: AWS_ROLE_TO_ASSUME (ARN da role IAM com trust OIDC do GitHub)
#   Secrets: ECR_REPOSITORY_URL, ECS_CLUSTER_NAME, ECS_SERVICE_NAME
#   Variables: AWS_REGION (ou secret)
#   Opcional pós-deploy: SMOKE_BASE_URL (variable ou secret), SMOKE_SKIP_READY
#   Opcional terraform plan: backend state (TF_STATE_*) + Variables/Secrets TF_* / TF_VAR via env (sem tfvars em S3).
#
# Documentação: docs/deployment/github-actions-aws.md

name: Deploy AWS (ECR + ECS)

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Tag da imagem no ECR (ex. latest, v1.0.0, ou vazio = SHA curto)"
        required: false
        default: ""
      skip_ecs_rollout:
        description: "Apenas build e push — não chama ecs-force-new-deployment"
        type: boolean
        default: false
      skip_smoke:
        description: "Não rodar espera ECS + smoke (mesmo com SMOKE_BASE_URL)"
        type: boolean
        default: false
      run_terraform_plan:
        description: "Rodar job paralelo terraform plan (foundation) — exige backend state + Variables/Secrets TF_*"
        type: boolean
        default: false

  # push:
  #   branches: [main]

concurrency:
  group: deploy-aws-${{ github.ref }}
  cancel-in-progress: false

jobs:
  terraform-plan:
    name: Terraform plan (foundation)
    # Inputs boolean podem chegar como string 'true'/'false' em event.inputs.
    if: >-
      github.event_name == 'workflow_dispatch'
      && (github.event.inputs.run_terraform_plan == true
          || github.event.inputs.run_terraform_plan == 'true')
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      id-token: write
    env:
      AWS_REGION: ${{ vars.AWS_REGION || secrets.AWS_REGION }}
      # Obrigatórios para o módulo foundation (espelham terraform.tfvars.example).
      TF_VAR_aws_region: ${{ vars.AWS_REGION || secrets.AWS_REGION }}
      TF_VAR_project_name: ${{ vars.TF_PROJECT_NAME || 'catalogo-eventos-api' }}
      TF_VAR_environment: ${{ vars.TF_ENVIRONMENT || 'dev' }}
      TF_VAR_media_bucket_name: ${{ vars.TF_MEDIA_BUCKET_NAME }}
      TF_VAR_s3_public_base_url: ${{ vars.TF_S3_PUBLIC_BASE_URL }}
      TF_VAR_jwt_secret: ${{ secrets.TF_JWT_SECRET }}
      TF_VAR_jwt_access_secret: ${{ secrets.TF_JWT_ACCESS_SECRET }}
      TF_VAR_jwt_refresh_secret: ${{ secrets.TF_JWT_REFRESH_SECRET }}
      # Opcionais com defaults alinhados a variables.tf (override via Variables).
      TF_VAR_container_image: ${{ vars.TF_CONTAINER_IMAGE || 'public.ecr.aws/docker/library/nginx:alpine' }}
      TF_VAR_container_port: ${{ vars.TF_CONTAINER_PORT || '80' }}
      TF_VAR_health_check_path: ${{ vars.TF_HEALTH_CHECK_PATH || '/' }}
      TF_VAR_desired_count: ${{ vars.TF_DESIRED_COUNT || '1' }}
      TF_VAR_use_managed_rds: ${{ vars.TF_USE_MANAGED_RDS || 'true' }}
      TF_VAR_external_db_host: ${{ vars.TF_EXTERNAL_DB_HOST }}
      TF_VAR_external_db_password: ${{ secrets.TF_EXTERNAL_DB_PASSWORD }}
      TF_VAR_nat_gateway_enabled: ${{ vars.TF_NAT_GATEWAY_ENABLED || 'false' }}
      TF_VAR_acm_certificate_arn: ${{ vars.TF_ACM_CERTIFICATE_ARN }}
      TF_VAR_enable_apigatewayv2_alb_proxy: ${{ vars.TF_ENABLE_APIGATEWAYV2_ALB_PROXY || 'false' }}
      TF_VAR_bootstrap_admin_email: ${{ vars.TF_BOOTSTRAP_ADMIN_EMAIL || 'admin@catalogo-eventos.com.br' }}
    defaults:
      run:
        working-directory: infra/aws/foundation

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.9.8"

      - name: Configurar credenciais AWS (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          role-session-name: github-actions-terraform-plan
          aws-region: ${{ env.AWS_REGION }}

      - name: Validar backend de state e variáveis obrigatórias
        env:
          # Bucket/key de state não são credenciais; Variables é o ideal. Secrets também funcionam.
          TF_STATE_BUCKET: ${{ vars.TF_STATE_BUCKET || secrets.TF_STATE_BUCKET }}
          TF_STATE_KEY: ${{ vars.TF_STATE_KEY || secrets.TF_STATE_KEY }}
          MEDIA_BUCKET: ${{ vars.TF_MEDIA_BUCKET_NAME }}
          S3_PUBLIC_BASE_URL: ${{ vars.TF_S3_PUBLIC_BASE_URL }}
          JWT_SECRET: ${{ secrets.TF_JWT_SECRET }}
          JWT_ACCESS: ${{ secrets.TF_JWT_ACCESS_SECRET }}
          JWT_REFRESH: ${{ secrets.TF_JWT_REFRESH_SECRET }}
        run: |
          set -euo pipefail
          if [ -z "${TF_STATE_BUCKET:-}" ] || [ -z "${TF_STATE_KEY:-}" ]; then
            echo "::error::Defina TF_STATE_BUCKET e TF_STATE_KEY (Repository Variable ou Secret; backend S3 so para state)."
            exit 1
          fi
          missing=0
          [ -z "${MEDIA_BUCKET:-}" ] && echo "::error::Defina a Variable TF_MEDIA_BUCKET_NAME (output bucket_name do s3-phase1)." && missing=1
          [ -z "${S3_PUBLIC_BASE_URL:-}" ] && echo "::error::Defina a Variable TF_S3_PUBLIC_BASE_URL (output s3_public_base_url do s3-phase1)." && missing=1
          [ -z "${JWT_SECRET:-}" ] && echo "::error::Defina o Secret TF_JWT_SECRET (minimo 16 caracteres)." && missing=1
          [ -z "${JWT_ACCESS:-}" ] && echo "::error::Defina o Secret TF_JWT_ACCESS_SECRET (minimo 16 caracteres)." && missing=1
          [ -z "${JWT_REFRESH:-}" ] && echo "::error::Defina o Secret TF_JWT_REFRESH_SECRET (minimo 16 caracteres)." && missing=1
          exit "$missing"

      - name: Terraform init (backend remoto)
        env:
          TF_STATE_BUCKET: ${{ vars.TF_STATE_BUCKET || secrets.TF_STATE_BUCKET }}
          TF_STATE_KEY: ${{ vars.TF_STATE_KEY || secrets.TF_STATE_KEY }}
          TF_STATE_REGION: ${{ vars.TF_STATE_REGION || secrets.TF_STATE_REGION }}
          TF_STATE_DYNAMODB_TABLE: ${{ vars.TF_STATE_DYNAMODB_TABLE || secrets.TF_STATE_DYNAMODB_TABLE }}
        run: |
          set -euo pipefail
          REGION="${TF_STATE_REGION:-${AWS_REGION}}"
          ARGS=(
            -input=false
            "-backend-config=bucket=${TF_STATE_BUCKET}"
            "-backend-config=key=${TF_STATE_KEY}"
            "-backend-config=region=${REGION}"
            "-backend-config=encrypt=true"
          )
          if [ -n "${TF_STATE_DYNAMODB_TABLE:-}" ]; then
            ARGS+=("-backend-config=dynamodb_table=${TF_STATE_DYNAMODB_TABLE}")
          fi
          terraform init "${ARGS[@]}"

      - name: Terraform plan
        run: terraform plan -input=false -no-color

  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      id-token: write

    env:
      AWS_REGION: ${{ vars.AWS_REGION || secrets.AWS_REGION }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolver tag da imagem
        id: meta
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ -n "${{ github.event.inputs.image_tag }}" ]; then
            echo "tag=${{ github.event.inputs.image_tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${GITHUB_SHA:0:7}" >> "$GITHUB_OUTPUT"
          fi

      # secrets/vars não podem ser usados em `if:`; calculamos aqui com env (permitido).
      - name: Definir se roda smoke ALB após rollout
        id: smoke_cfg
        env:
          URL_VAR: ${{ vars.SMOKE_BASE_URL }}
          URL_SECRET: ${{ secrets.SMOKE_BASE_URL }}
          SKIP_SMOKE: ${{ github.event_name == 'workflow_dispatch' && (github.event.inputs.skip_smoke == true || github.event.inputs.skip_smoke == 'true') }}
        run: |
          if [ "$SKIP_SMOKE" = "true" ]; then
            echo "run=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if [ -n "$URL_VAR" ] || [ -n "$URL_SECRET" ]; then
            echo "run=true" >> "$GITHUB_OUTPUT"
          else
            echo "run=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Configurar credenciais AWS (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          role-session-name: github-actions-deploy-ecs
          aws-region: ${{ env.AWS_REGION }}

      - name: Build e push (script do repositório)
        env:
          ECR_REPOSITORY_URL: ${{ secrets.ECR_REPOSITORY_URL }}
          IMAGE_TAG: ${{ steps.meta.outputs.tag }}
        run: ./scripts/ecr-build-push.sh

      - name: Forçar nova implantação no ECS
        id: rollout
        if: >-
          github.event_name != 'workflow_dispatch'
          || (github.event.inputs.skip_ecs_rollout != true
              && github.event.inputs.skip_ecs_rollout != 'true')
        env:
          ECS_CLUSTER_NAME: ${{ secrets.ECS_CLUSTER_NAME }}
          ECS_SERVICE_NAME: ${{ secrets.ECS_SERVICE_NAME }}
        run: |
          ./scripts/ecs-force-new-deployment.sh
          echo "ran=true" >> "$GITHUB_OUTPUT"

      - name: Aguardar serviço ECS estável
        if: steps.rollout.outputs.ran == 'true' && steps.smoke_cfg.outputs.run == 'true'
        env:
          ECS_CLUSTER_NAME: ${{ secrets.ECS_CLUSTER_NAME }}
          ECS_SERVICE_NAME: ${{ secrets.ECS_SERVICE_NAME }}
        run: >-
          aws ecs wait services-stable
          --cluster "$ECS_CLUSTER_NAME"
          --services "$ECS_SERVICE_NAME"
          --region "$AWS_REGION"

      - name: Smoke ALB (/health e /ready)
        if: steps.rollout.outputs.ran == 'true' && steps.smoke_cfg.outputs.run == 'true'
        env:
          SMOKE_BASE_URL: ${{ vars.SMOKE_BASE_URL || secrets.SMOKE_BASE_URL }}
          SMOKE_SKIP_READY: ${{ vars.SMOKE_SKIP_READY }}
        run: node scripts/smoke-alb.cjs
