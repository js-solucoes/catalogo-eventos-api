tags:
  - name: Home Content PUBLIC
    description: Agregador público da landing (banners + destaques). Não expõe rotas públicas separadas para banners/highlights.

paths:
  /public/home-content:
    get:
      summary: Conteúdo da home para a landing (listas de banners e destaques)
      tags:
        - Home Content PUBLIC
      responses:
        200:
          description: Banners e destaques obtidos com sucesso
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PublicHomeContentResponse"

components:
  schemas:
    PublicHomeContentResponse:
      type: object
      properties:
        data:
          type: object
          properties:
            banners:
              type: array
              items:
                $ref: "#/components/schemas/PublicHomeBanner"
            highlights:
              type: array
              items:
                $ref: "#/components/schemas/PublicHomeHighlight"
        meta:
          $ref: "#/components/schemas/Meta"
    PublicHomeBanner:
      type: object
      properties:
        id: { type: number, example: 0 }
        title: { type: string, example: "" }
        subtitle: { type: string, example: "" }
        imageUrl: { type: string, example: "" }
        ctaLabel: { type: string, example: "" }
        ctaUrl: { type: string, example: "" }
        active: { type: boolean, example: true }
        order: { type: number, example: 0 }
    PublicHomeHighlight:
      type: object
      properties:
        id: { type: number, example: 0 }
        type: { type: string, example: "event" }
        referenceId: { type: number, example: 0 }
        title: { type: string, example: "" }
        description: { type: string, example: "" }
        cityName: { type: string, example: "" }
        imageUrl: { type: string, example: "" }
        ctaUrl: { type: string, example: "" }
        active: { type: boolean, example: true }
        order: { type: number, example: 0 }
