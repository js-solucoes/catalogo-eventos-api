tags:
  - name: Users ADMIN
    description: Endpoints relacionados aos usu?rios do Celeiro do MS

paths:
  /admin/users:
    post:
      summary: Cria um novo usu?rio
      tags:
        - Users ADMIN
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserAdmin'
      responses:
        '201':
          description: Usu?rio criado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserResponse'
        '409':
          description: E-mail j? em uso
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    get:
      summary: Lista usu?rios (paginado)
      tags:
        - Users ADMIN
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: page
          schema:
            type: integer
            minimum: 1
            default: 1
        - in: query
          name: limit
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 10
        - in: query
          name: name
          description: Filtro parcial por nome (LIKE)
          schema:
            type: string
        - in: query
          name: email
          description: Filtro por e-mail exato
          schema:
            type: string
            format: email
        - in: query
          name: sortBy
          schema:
            type: string
            enum: [name, email, createdAt]
        - in: query
          name: sortDir
          schema:
            type: string
            enum: [asc, desc]
            default: asc
      responses:
        '200':
          description: Cole??o paginada de usu?rios (sem senha); meta com total, p?gina e ordena??o; links HATEOAS incluindo pagina??o e create
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UsersCollectionResponse'
        '400':
          description: Query inv?lida (campos n?o permitidos ou tipos incorretos)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InvalidQueryResponse'

  /admin/users/{id}:
    get:
      summary: Busca usu?rio por id
      tags:
        - Users ADMIN
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Usu?rio encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserResponse'
        '404':
          description: Usu?rio n?o encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

    patch:
      summary: Atualiza usu?rio por id
      tags:
        - Users ADMIN
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          schema:
            type: integer
          required: true
          description: ID do usu?rio a ser atualizado
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateUserRequest'
      responses:
        '200':
          description: Usu?rio atualizado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserResponse'
        '404':
          description: Usu?rio n?o encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

    delete:
      summary: Remove usu?rio por id
      tags:
        - Users ADMIN
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          schema:
            type: integer
          required: true
          description: ID do usu?rio a ser removido
      responses:
        '204':
          description: Usu?rio removido
        '404':
          description: Usu?rio n?o encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

components:
  schemas:
    InvalidQueryResponse:
      type: object
      properties:
        message:
          type: string
          example: Invalid query params
        errors:
          type: array
          items:
            type: object
            properties:
              path:
                type: string
              message:
                type: string
      required: [message, errors]

    UsersListMeta:
      allOf:
        - $ref: '#/components/schemas/Meta'
      properties:
        version:
          type: string
          example: "1.0.0"
        total:
          type: integer
        totalPages:
          type: integer
        page:
          type: integer
        limit:
          type: integer
        sort:
          type: object
          properties:
            by:
              type: string
              enum: [name, email, createdAt]
            dir:
              type: string
              enum: [asc, desc]

    UpdateUserRequest:
      type: object
      properties:
        name:
          type: string
        email:
          type: string
          format: email
        password:
          type: string
          format: password
        role:
          type: string
          enum: [Admin]

    UserResponse:
      type: object
      properties:
        data:
          $ref: '#/components/schemas/UserAdminResponse'
        links:
          $ref: '#/components/schemas/Links'
        meta:
          $ref: '#/components/schemas/Meta'
      required: [data]

    UsersCollectionResponse:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/UserAdminResponse'
        links:
          $ref: '#/components/schemas/Links'
        meta:
          $ref: '#/components/schemas/UsersListMeta'
      required: [data, meta]

    UserAdmin:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        email:
          type: string
          format: email
        role:
          type: string
          enum: [Admin]
        password:
          type: string
          format: password
      required: [id, name, password, email, role]
    UserAdminResponse:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        email:
          type: string
          format: email
        role:
          type: string
          enum: [Admin]
      required: [id, name, email, role]
